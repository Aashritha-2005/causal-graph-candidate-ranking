ai_tools_used:
  - "Claude (claude-sonnet-4-6) — architecture discussion, code review, debugging"

ai_usage_summary: |
  Claude (Anthropic claude-sonnet-4-6) was used throughout this project for:
  - Architecture design and pre-code verification (candidate dataset spot-checks,
    honeypot detectability measurement, disqualifier flag resolution)
  - Code generation and iterative review across all phases (parse.py, score_mvp.py,
    ot_matching.py, disqualifier.py, score_rescaling.py, rank.py, reasoning.py)
  - Debugging (OT sinkhorn return-type bug, D4 false-positive, silent-exception audit)
  - Documentation and changelog (PROJECT.md, ARCHITECTURE.md)

  No candidate data was fed to any external LLM at ranking time. Zero network calls
  during the ranking step. Reasoning strings are template-based from real structured
  fields — no LLM-generated text in the output.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal ranking pipeline with no LLM inference at ranking time.

  Precompute (one-time, ~8 min): parse 100K candidates into a 45-column structured
  feature table; embed candidate text and JD text with all-MiniLM-L6-v2 (384-dim);
  build FAISS IndexFlatIP for cosine shortlisting.

  Ranking step (~17 s): FAISS retrieves k=5000 shortlist → Sinkhorn optimal-transport
  matches candidate skill distributions against the JD's 12-skill embedding matrix
  (POT library, ε=0.05) → structural disqualifier penalties applied as soft multipliers
  for JD's stated disqualifiers (frequent-hopper, pure-services, CV/speech, low GitHub)
  → composite score (W_SEM=0.35, W_OT=0.10, W_CAREER=0.30, W_AVAIL=0.15, W_LOC=0.10)
  multiplied by plausibility^0.40 → Platt sigmoid rescaling for score presentation
  (monotone, preserves rank order) → template-based reasoning from structured fields.

  Key design decisions: (1) plausibility_score catches ~43 of ~80 expected honeypots
  via date-math and proficiency-duration mismatch; non-AI-title honeypots suppressed
  naturally by domain scoring. (2) Disqualifier flags D1 and D2 dropped after measuring
  0 candidates matched on 100K dataset. (3) D4 (frequent-hopper) exempts candidates
  with ≥36 months applied ML, verified by profile inspection. (4) "Conformal
  calibration" from original design was renamed to "Platt sigmoid score rescaling"
  after confirming no held-out calibration set exists locally and the transform is
  monotone (zero NDCG/MAP impact).

